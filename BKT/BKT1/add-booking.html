<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thêm Đặt Phòng</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav style="position: fixed; top: 10px; right: 10px; z-index: 1000;">
        <a href="add-booking.html"
            style="margin-right: 10px; padding: 8px 15px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; display: inline-block;">Thêm
            đặt phòng</a>
        <a href="bookings.html"
            style="padding: 8px 15px; background-color: #28a745; color: white; text-decoration: none; border-radius: 4px; display: inline-block;">Quản
            lí đặt phòng</a>
    </nav>

    <h2>ĐỀ 01: THÊM ĐẶT PHÒNG</h2>
    <form id="bookingForm">
        <label for="bookingId">ID:</label>
        <input type="text" id="bookingId" placeholder="Mã (PH123456)" required>
        <label for="customerName">Khách hàng:</label>
        <input type="text" id="customerName" placeholder="Họ tên (2-50 ký tự)" required>
        <label for="SĐT">SĐT:</label>
        <input type="tel" id="phone" placeholder="0xxxxxxxxx" required>
        <label for="roomType">Loại phòng:</label>
        <select id="roomType">
            <option value="Standard">Standard</option>
            <option value="Deluxe">Deluxe</option>
            <option value="Suite">Suite</option>
            <option value="VIP">VIP</option>
        </select>

        <label>Ngày nhận:</label>
        <input type="date" id="checkIn" required>
        <label>Ngày trả:</label>
        <input type="date" id="checkOut" required>
        <label>Người lớn:</label>
        <input type="number" id="adults" placeholder="Người lớn (1-4)" min="1" max="4">
        <label>Trẻ em:</label>
        <input type="number" id="children" placeholder="Trẻ em (0-6)" min="0" max="6">
        <label for="promoCode">Mã giảm giá:</label>
        <input type="text" id="promoCode" placeholder="Mã giảm giá (SAVE20%)">
        <label for="confirmPromo">Xác nhận mã:</label>
        <input type="text" id="confirmPromo" placeholder="Xác nhận mã">

        <button type="submit">Lưu Đặt Phòng</button>
        <button type="reset">Làm mới</button>
        <a href="bookings.html">Xem danh sách</a>
    </form>

    <div id="toast"></div>

    <script src="script.js"></script>
    <script>
        // Kiểm tra nếu đang ở chế độ sửa
        window.addEventListener('load', function () {
            const params = new URLSearchParams(window.location.search);
            if (params.has('edit')) {
                const editingData = sessionStorage.getItem('editingBooking');
                if (editingData) {
                    const { index, data } = JSON.parse(editingData);
                    // Điền dữ liệu cũ vào form
                    document.getElementById('bookingId').value = data.id;
                    document.getElementById('customerName').value = data.name;
                    document.getElementById('phone').value = data.phone;
                    document.getElementById('roomType').value = data.room;
                    document.getElementById('checkIn').value = data.checkIn;
                    document.getElementById('checkOut').value = data.checkOut;
                    document.getElementById('adults').value = data.adults || 0;
                    document.getElementById('children').value = data.children || 0;
                    document.getElementById('promoCode').value = data.promoCode || '';
                    document.getElementById('confirmPromo').value = data.promoCode || '';

                    // Lưu index để sử dụng khi update
                    sessionStorage.setItem('editingIndex', index);
                }
            }
        });
    </script>
</body>

</html>
