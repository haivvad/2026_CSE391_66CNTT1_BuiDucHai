<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Điểm Sinh Viên</title>
    <style>
        .weak-student {
            background-color: yellow;
        }

        /* Tô màu vàng cho điểm < 5 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        #sortArrow {
            margin-left: 5px;
        }
    </style>
</head>

<body>
    <h2>Quản Lý Điểm Sinh Viên</h2>
    <input type="text" id="fullname" placeholder="Họ tên">
    <input type="number" id="score" placeholder="Điểm (0-10)" step="0.1">
    <button id="btnAdd">Thêm</button>

    <br><br>
    <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên...">
    <select id="filterRank">
        <option value="">Tất cả</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th id="scoreHeader">Điểm <span id="sortArrow"></span></th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
    </table>

    <div id="statistics" style="margin-top: 15px; font-weight: bold;"></div>

    <script src="script.js"></script>
</body>

</html>
