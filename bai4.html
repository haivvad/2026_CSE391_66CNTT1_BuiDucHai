<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài tập 04 - Full Form</title>
    <style>
        body { font-family: sans-serif; font-size: 14px; color: #333; background-color: #f0f0f0; padding: 20px; }
        .form-container { max-width: 750px; margin: auto; background: white; border: 1px solid #ccc; padding: 15px; position: relative; }
        h3 { border-bottom: 1px solid #999; margin: 20px 0 10px 0; font-size: 16px; font-weight: bold; }
        .row { display: flex; margin-bottom: 8px; align-items: flex-start; }
        .label { width: 160px; font-weight: normal; }
        .input-content { flex: 1; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; border: 1px solid #7a7a7a; padding: 3px; box-sizing: border-box; }
        .gender-options label { display: block; margin-bottom: 2px; }
        .note-toolbar { border: 1px solid #ccc; background: #eee; padding: 5px; border-bottom: none; display: flex; gap: 5px; }
        .note-editor { height: 150px; border: 1px solid #ccc; padding: 10px; }
        .footer { background: #555; padding: 5px; display: flex; justify-content: flex-end; gap: 5px; margin-top: 20px; }
        button { padding: 2px 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Basic Info</h3>
    <div class="row">
        <div class="label">Employee ID</div>
        <div class="input-content">9</div>
    </div>
    <div class="row">
        <div class="label">Last Name</div>
        <div class="input-content"><input type="text" value="Dodsworth"></div>
    </div>
    <div class="row">
        <div class="label">First Name</div>
        <div class="input-content"><input type="text" value="Anne"></div>
    </div>
    <div class="row">
        <div class="label">Gender</div>
        <div class="input-content gender-options">
            <label><input type="radio" name="g"> Male</label>
            <label><input type="radio" name="g"> Female</label>
            <label><input type="radio" name="g"> XXX</label>
            <label><input type="radio" name="g" checked> ZZZ</label>
        </div>
    </div>
    <div class="row">
        <div class="label">Title</div>
        <div class="input-content"><input type="text" value="Sales Representative"></div>
    </div>
    <div class="row">
        <div class="label">Suffix</div>
        <div class="input-content"><input type="text" value="Ms."></div>
    </div>
    <div class="row">
        <div class="label">BirthDate</div>
        <div class="input-content"><input type="text" value="1969-07-02 00:00:00"></div>
    </div>
    <div class="row">
        <div class="label">HireDate</div>
        <div class="input-content"><input type="text" value="1994-11-15 00:00:00"></div>
    </div>
    <div class="row">
        <div class="label">Reports To</div>
        <div class="input-content">
            <select><option>Buchanan</option></select>
        </div>
    </div>

    <h3>Contact Info</h3>
    <div class="row">
        <div class="label">Email</div>
        <div class="input-content"><input type="email" placeholder="name@example.com"></div>
    </div>
    <div class="row">
        <div class="label">Address</div>
        <div class="input-content"><input type="text" value="7 Houndstooth Rd."></div>
    </div>
    <div class="row">
        <div class="label">City</div>
        <div class="input-content"><input type="text" value="London"></div>
    </div>
    <div class="row">
        <div class="label">Region</div>
        <div class="input-content"><input type="text"></div>
    </div>
    <div class="row">
        <div class="label">Postal Code</div>
        <div class="input-content"><input type="text" value="WG2 7LT"></div>
    </div>
    <div class="row">
        <div class="label">Country</div>
        <div class="input-content">
            <select><option>Russian Federation</option></select>
        </div>
    </div>
    <div class="row">
        <div class="label">US Home Phone</div>
        <div class="input-content"><input type="text" value="(234)234-2342"></div>
    </div>
    <div class="row">
        <div class="label">Photo</div>
        <div class="input-content"><input type="text" value="EmpID9.bmp"></div>
    </div>

    <h3>Optional Info</h3>
    <div class="row">
        <div class="label">Notes</div>
        <div class="input-content">
            <div class="note-toolbar"><b>B</b> <i>I</i> <u>U</u> | ≡ ≡ ≡</div>
            <textarea class="note-editor">Anne has a BA degree in English from St. Lawrence College. She is fluent in French and German.ZZZ</textarea>
        </div>
    </div>
    <div class="row">
        <div class="label">Preferred Shift</div>
        <div class="input-content">
            <label><input type="checkbox"> Regular</label><br>
            <label><input type="checkbox" checked> Gravy Yard</label>
        </div>
    </div>
    <div class="row">
        <div class="label">Active?</div>
        <div class="input-content"><input type="checkbox" checked></div>
    </div>
    <div class="row">
        <div class="label">Are you human?</div>
        <div class="input-content">
            <div style="font-family: 'Courier New'; font-weight: bold; font-size: 20px; letter-spacing: 5px;">TIDAWO</div>
            <small>Click to change</small><br>
            <input type="text">
        </div>
    </div>

    <div class="footer">
        <button type="submit">💾 Submit</button>
        <button type="button">✖ Cancel</button>
    </div>
</div>

</body>
</html>
